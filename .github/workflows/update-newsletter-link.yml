name: Update Newsletter Link

on:
  # Schedule disabled until setup is complete. Uncomment to enable:
  # schedule:
  #   # Every Tuesday at 9:00 AM Prague time (Europe/Prague)
  #   # Prague is UTC+1 (CET) or UTC+2 (CEST during summer)
  #   # 9 AM CET = 8:00 UTC | 9 AM CEST = 7:00 UTC
  #   - cron: '0 7 * * 2'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest newsletter link
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
        run: node scripts/update-newsletter-link.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter-link.json
          git diff --staged --quiet || (git commit -m "chore: update newsletter link [automated]" && git push)
