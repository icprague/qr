name: Update Newsletter Link

on:
  schedule:
    # Every Friday at 3:15, 4:15, 5:15 PM Prague time (Europe/Prague)
    # Prague is UTC+1 (CET) or UTC+2 (CEST during summer)
    # Script exits quietly if newsletter not sent yet (retries next hour).
    # At 5:15 PM (last attempt), sends failure email if still not found.
    - cron: '15 14 * * 5'  # ~3:15 PM Prague (CET)
    - cron: '15 15 * * 5'  # ~4:15 PM Prague (CET)
    - cron: '15 16 * * 5'  # ~5:15 PM Prague (CET)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-newsletter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest newsletter link
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FAIL_EMAIL: ${{ secrets.FAIL_EMAIL }}
        run: node scripts/update-newsletter-link.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter-link.json
          git diff --staged --quiet || (git commit -m "chore: update newsletter link [automated]" && git push)
