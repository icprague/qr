name: "Send Announcements to Moderator"

on:
  # Schedule disabled until setup is complete. Uncomment to enable:
  # schedule:
  #   # Every Saturday at 8:00 AM Prague time (Europe/Prague)
  #   # Prague is UTC+1 (CET) or UTC+2 (CEST during summer)
  #   # 8 AM CET = 7:00 UTC | 8 AM CEST = 6:00 UTC
  #   - cron: '0 6 * * 6'
  #   # Every Tuesday at 9:00 AM Prague time
  #   # 9 AM CET = 8:00 UTC | 9 AM CEST = 7:00 UTC
  #   - cron: '0 7 * * 2'
  workflow_dispatch: # Allow manual trigger

jobs:
  send-moderator-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Look up moderator and send email
        env:
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
        run: node scripts/send-moderator-email.js
