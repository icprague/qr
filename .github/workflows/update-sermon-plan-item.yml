name: "Write Sermon Title to Planning Center Order of Service"

# Runs on Friday when the newsletter is available.
# Reads sermon title + scripture from the Mailchimp newsletter and writes
# it into the "Sermon" plan item in Planning Center.
# Tries 3 times (3:15, 4:15, 5:15 PM Prague). Exits quietly if newsletter
# not found yet. Sends failure email only on the last attempt (5:15 PM).

# Prague is UTC+1 (CET, winter) / UTC+2 (CEST, summer).

on:
  # schedule:  # PAUSED - uncomment to re-enable automatic Friday triggers
  #   # Every Friday at 1:15, 2:15, 3:15, 4:15 PM Prague time (CET = UTC+1).
  #   # During CEST (summer, UTC+2) these shift 1 hour later in local time.
  #   # Script exits quietly if newsletter not sent yet (retries next hour).
  #   # On the last attempt (4th), sends failure email if still not found.
  #   - cron: '15 12 * * 5'  # 1:15 PM Prague (CET)
  #   - cron: '15 13 * * 5'  # 2:15 PM Prague (CET)
  #   - cron: '15 14 * * 5'  # 3:15 PM Prague (CET)
  #   - cron: '15 15 * * 5'  # 4:15 PM Prague (CET)
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  update-sermon-plan-item:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract sermon info from newsletter and write to Planning Center
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FAIL_EMAIL: ${{ secrets.FAIL_EMAIL }}
          ATTEMPT: >-
            ${{ github.event.schedule == '15 12 * * 5' && '1' ||
                github.event.schedule == '15 13 * * 5' && '2' ||
                github.event.schedule == '15 14 * * 5' && '3' ||
                '4' }}
          MAX_ATTEMPTS: '4'
        run: node scripts/update-sermon-plan-item.js
