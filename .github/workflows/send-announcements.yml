name: Send Sunday Announcements

on:
  # Schedule disabled until setup is complete. Uncomment to enable:
  # schedule:
  #   # Every Friday at 4:00 PM Prague time (Europe/Prague)
  #   # 4 PM CET = 15:00 UTC | 4 PM CEST = 14:00 UTC
  #   - cron: '0 14 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  send-announcements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/documents'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate announcements and send email
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          CC_EMAIL: ${{ secrets.CC_EMAIL }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: node scripts/send-announcements.js
