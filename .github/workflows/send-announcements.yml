name: "Send Announcements to Editors (Friday)"

on:
  # Schedule disabled until setup is complete. Uncomment to enable:
  # schedule:
  #   # Every Friday at 3:30 PM Prague time (Europe/Prague)
  #   # Prague is UTC+1 (CET) or UTC+2 (CEST during summer)
  #   # 3:30 PM CET = 14:30 UTC | 3:30 PM CEST = 13:30 UTC
  #   - cron: '30 13 * * 5'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  send-announcements:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/documents,https://www.googleapis.com/auth/spreadsheets.readonly'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate announcements and send editors email
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EDITOR_EMAILS: ${{ secrets.EDITOR_EMAILS }}
          FAIL_EMAIL: ${{ secrets.FAIL_EMAIL }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: node scripts/send-announcements.js

      - name: Write moderator name into Planning Center order of service
        env:
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
        run: node scripts/update-plan-items.js
