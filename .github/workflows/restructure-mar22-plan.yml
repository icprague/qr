name: "Restructure Sunday Plan"

# Restructures a Sunday plan to match the standard service template.
# Detects communion Sundays automatically from the plan title.
#
# Run with mode = "dry-run" first to preview changes, then "apply" to commit them.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Sunday date to restructure (YYYY-MM-DD)'
        required: true
        type: string
      mode:
        description: 'dry-run = preview only, apply = actually update Planning Center'
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply

jobs:
  restructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Restructure plan
        env:
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          TARGET_DATE: ${{ inputs.date }}
        run: |
          if [ "${{ inputs.mode }}" = "apply" ]; then
            node scripts/restructure-mar22-plan.js --apply
          else
            node scripts/restructure-mar22-plan.js
          fi
