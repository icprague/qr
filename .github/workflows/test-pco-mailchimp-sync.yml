name: Test PCO → Mailchimp Sync (Dry Run)

on:
  workflow_dispatch: # Manual trigger only

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Dry-run sync (log only, no Mailchimp writes)
        env:
          PLANNING_CENTER_APP_ID: ${{ secrets.PLANNING_CENTER_APP_ID }}
          PLANNING_CENTER_SECRET: ${{ secrets.PLANNING_CENTER_SECRET }}
          DRY_RUN: 'true'
        run: node scripts/sync-pco-mailchimp.js
