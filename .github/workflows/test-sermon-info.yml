name: "Test: Extract Sermon Info from Newsletter"

on:
  workflow_dispatch: # Manual trigger only

jobs:
  test-sermon-info:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Extract sermon info from latest newsletter
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
        run: node scripts/test-sermon-info.js
