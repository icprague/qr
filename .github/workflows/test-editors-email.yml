name: "Test: Send Editors Email"

on:
  workflow_dispatch: # Manual trigger only

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  test-editors-email:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_scopes: 'https://www.googleapis.com/auth/documents'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Test editors email flow (skips same-day check)
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EDITOR_EMAILS: ${{ secrets.EDITOR_EMAILS }}
          FAIL_EMAIL: ${{ secrets.FAIL_EMAIL }}
          GOOGLE_DOC_ID: ${{ secrets.GOOGLE_DOC_ID }}
          GOOGLE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          SKIP_DATE_CHECK: 'true'
        run: node scripts/send-announcements.js
