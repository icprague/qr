<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Czech Bank Transfer – International Church of Prague</title>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YL2P0BP685"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YL2P0BP685');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Raleway:wght@400;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      padding: 20px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      width: 35%;
      max-width: 200px;
      margin-bottom: 16px;
      display: block;
    }

    .heading {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(18px, 5vw, 28px);
      color: #181c3a;
      text-align: center;
      margin-bottom: 12px;
    }

    .note {
      font-family: 'Raleway', sans-serif;
      font-weight: 400;
      font-size: clamp(14px, 3.5vw, 17px);
      color: #555;
      text-align: center;
      max-width: 480px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .qr-wrapper {
      background: #fff;
      border: 2px solid #e0e4f0;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .qr-img {
      display: block;
      width: 240px;
      height: 240px;
      object-fit: contain;
    }

    .bank-details {
      width: 100%;
      max-width: 480px;
      background: #f4f6fb;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }

    .bank-details table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Raleway', sans-serif;
      font-size: clamp(13px, 3.2vw, 16px);
    }

    .bank-details tr {
      border-bottom: 1px solid #dde2ef;
    }

    .bank-details tr:last-child {
      border-bottom: none;
    }

    .bank-details td {
      padding: 8px 4px;
      line-height: 1.4;
    }

    .bank-details td:first-child {
      color: #888;
      font-weight: 600;
      white-space: nowrap;
      padding-right: 14px;
      width: 1%;
    }

    .bank-details td:last-child {
      color: #181c3a;
      font-weight: 600;
    }

    .highlight {
      color: #222a58 !important;
    }

    .copy-btn {
      margin-left: 10px;
      padding: 3px 10px;
      font-family: 'Raleway', sans-serif;
      font-size: 12px;
      font-weight: 600;
      background: #222a58;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      vertical-align: middle;
      transition: background-color 0.2s ease;
    }

    .copy-btn.copied {
      background: #2e7d32;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      margin-bottom: 24px;
      padding: 10px 20px;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(15px, 3.5vw, 17px);
      color: #222a58;
      text-decoration: none;
      border: 2px solid #222a58;
      border-radius: 8px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      background-color: #222a58;
      color: #fff;
      outline: none;
    }
  </style>
</head>

<body>
  <img
    src="https://lh3.googleusercontent.com/d/1-XOxQXAiq2ws_-VB-FSksD5qKa4fQDSQ"
    alt="International Church of Prague"
    class="logo"
  >

  <h1 class="heading">Czech Bank Transfer (CZK)</h1>

  <p class="note">
    Screenshot this QR code and use it for QR payment in your banking app — or scan it directly from the app.
  </p>

  <div class="qr-wrapper">
    <img src="qr_platba.png" alt="QR Platba – Czech bank transfer QR code" class="qr-img">
  </div>

  <div class="bank-details">
    <table>
      <tr>
        <td>Account number</td>
        <td>
          <span id="acct-number">178324272/0300</span>
          <button id="copy-btn" class="copy-btn" aria-label="Copy account number">Copy</button>
        </td>
      </tr>
      <tr>
        <td>Variabilní symbol</td>
        <td class="highlight">1 &nbsp;← use this for tax deductibility</td>
      </tr>
    </table>
  </div>

  <a class="back-link" href="giving.html">&larr; Back to giving options</a>

  <script>
    if (typeof gtag === 'function') {
      gtag('event', 'page_view', { page_title: 'Czech Bank Transfer' });
    }

    var copyBtn = document.getElementById('copy-btn');
    if (copyBtn) {
      copyBtn.addEventListener('click', function () {
        var text = document.getElementById('acct-number').textContent;
        navigator.clipboard.writeText(text).then(function () {
          copyBtn.textContent = '✓ Copied';
          copyBtn.classList.add('copied');
          setTimeout(function () {
            copyBtn.textContent = 'Copy';
            copyBtn.classList.remove('copied');
          }, 2000);
        });
      });
    }
  </script>
</body>
</html>
