<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Supporting ICP – International Church of Prague</title>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-YL2P0BP685"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-YL2P0BP685');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Raleway:wght@600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      padding: 20px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      width: 50%;
      max-width: 300px;
      margin-bottom: 24px;
      display: block;
    }

    .heading {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 8vw, 48px);
      color: #181c3a;
      text-align: center;
      margin-bottom: 30px;
    }

    .buttons {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: max(12px, 3vw) max(16px, 4vw);
      margin-bottom: 30px;
      background-color: #222a58;
      color: #f7f9fe;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(19px, 6vw, 26px);
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      will-change: transform;
    }

    .btn:visited {
      color: #f7f9fe;
    }

    .btn:hover {
      background-color: #2d3570;
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(34, 42, 88, 0.3);
    }

    .btn:focus-visible {
      outline: 3px solid #4d6fff;
      outline-offset: 3px;
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(34, 42, 88, 0.2);
    }

    .btn-label {
      text-align: center;
    }

    .payment-icons {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .payment-icons svg {
      height: clamp(34px, 8.5vw, 44px);
      width: clamp(60px, 15vw, 78px);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      margin-bottom: 24px;
      padding: 10px 20px;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(15px, 3.5vw, 17px);
      color: #222a58;
      text-decoration: none;
      border: 2px solid #222a58;
      border-radius: 8px;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      background-color: #222a58;
      color: #fff;
      outline: none;
    }
  </style>
</head>

<body>
  <img
    src="https://lh3.googleusercontent.com/d/1-XOxQXAiq2ws_-VB-FSksD5qKa4fQDSQ"
    alt="International Church of Prague"
    class="logo"
  >
  <h1 class="heading">SUPPORTING ICP</h1>
  <div class="buttons">

    <a id="btn-czk" class="btn" href="czech-bank.html">
      <span class="btn-label">Czech Bank Transfer (CZK)</span>
    </a>

    <a id="btn-usd" class="btn" href="https://giving.myamplify.io//app/giving/idp" target="_blank" rel="noopener">
      <span class="btn-label">International &middot; Card (USD)</span>
      <span class="payment-icons" aria-hidden="true">
        <!-- Generic card – 60×34 -->
        <svg width="60" height="34" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-label="Credit card">
          <rect width="60" height="34" rx="5" fill="#0070ba"/>
          <rect x="0" y="11" width="60" height="8" fill="#fff" opacity="0.2"/>
          <rect x="5" y="7" width="9" height="6" rx="1" fill="#f5c842"/>
          <rect x="5" y="24" width="16" height="2" rx="1" fill="#fff" opacity="0.6"/>
          <rect x="24" y="24" width="11" height="2" rx="1" fill="#fff" opacity="0.4"/>
          <rect x="38" y="24" width="17" height="2" rx="1" fill="#fff" opacity="0.3"/>
        </svg>
        <!-- Apple Pay – black badge, 60×34 -->
        <svg width="60" height="34" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-label="Apple Pay">
          <rect width="60" height="34" rx="6" fill="#000"/>
          <text x="8" y="24" font-family="-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="500" fill="#fff">&#xF8FF; Pay</text>
        </svg>
        <!-- Google Pay – white badge with 4-colour Google G, 60×34 -->
        <svg width="60" height="34" viewBox="0 0 60 34" xmlns="http://www.w3.org/2000/svg" aria-label="Google Pay">
          <rect width="60" height="34" rx="6" fill="#fff"/>
          <g transform="translate(4,7) scale(0.833)">
            <path d="M20.64 12.2c0-.638-.057-1.252-.164-1.84H12v3.48h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908C19.66 17.01 20.64 14.7 20.64 12.2z" fill="#4285F4"/>
            <path d="M12 21c2.448 0 4.5-.806 6.004-2.184l-2.908-2.258c-.806.54-1.837.86-3.096.86-2.379 0-4.397-1.607-5.115-3.77H3.977v2.332A9.011 9.011 0 0012 21z" fill="#34A853"/>
            <path d="M6.885 13.648A5.42 5.42 0 016.6 12a5.42 5.42 0 01.285-1.648V8.02H3.977A9.011 9.011 0 003 12c0 1.452.348 2.827.977 4.02l2.908-2.372z" fill="#FBBC05"/>
            <path d="M12 6.58c1.34 0 2.542.461 3.49 1.368l2.615-2.615C16.496 3.89 14.448 3 12 3a9.011 9.011 0 00-8.023 4.02l2.908 2.332C7.603 7.632 9.62 6.58 12 6.58z" fill="#EA4335"/>
          </g>
          <text x="23" y="23" font-family="'Helvetica Neue',Arial,sans-serif" font-size="14" font-weight="500" fill="#5f6368">Pay</text>
        </svg>
      </span>
    </a>

  </div>

  <a class="back-link" href="index.html">&#8592; Back</a>

  <script>
    (function () {
      var buttons = {
        'btn-czk': 'giving_czk',
        'btn-usd': 'giving_usd'
      };
      Object.keys(buttons).forEach(function (id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener('click', function () {
            if (typeof gtag === 'function') {
              gtag('event', 'button_click', { button_name: buttons[id] });
            }
          });
        }
      });
    })();
  </script>
</body>
</html>
