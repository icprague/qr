<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <meta name="robots" content="noindex, nofollow">
  <title>International Church of Prague – Sunday Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Raleway:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      padding: 40px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      width: 50%;
      max-width: 300px;
      margin-bottom: 24px;
      display: block;
    }

    .heading {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: 10vw;
      color: #181c3a;
      text-align: center;
      margin-bottom: 40px;
    }

    .buttons {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 6vw;
      margin-bottom: 30px;
      background-color: #222a58;
      color: #f7f9fe;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: 7vw;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #2d3570;
    }

    @media (min-width: 1200px) {
      .heading {
        font-size: 48px;
      }

      .btn {
        font-size: 22px;
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <img
    src="https://lh3.googleusercontent.com/d/1-XOxQXAiq2ws_-VB-FSksD5qKa4fQDSQ"
    alt="International Church of Prague"
    class="logo"
  >
  <h1 class="heading">SUNDAY SERVICE</h1>
  <div class="buttons">
    <a id="btn-worship" class="btn" href="#" target="_blank" rel="noopener">Order of Worship</a>
    <a id="btn-give" class="btn" href="#" target="_blank" rel="noopener">Give Online</a>
    <a id="btn-newsletter" class="btn" href="#" target="_blank" rel="noopener">This Week's Newsletter</a>
    <a id="btn-connect" class="btn" href="#" target="_blank" rel="noopener">Connect Card</a>
  </div>

  <script>
    (function () {
      // Static links — replace the # placeholders with your actual URLs
      // Or edit config.json and they will be loaded automatically.

      var CONFIG_PATH = 'config.json';
      var NEWSLETTER_PATH = 'newsletter-link.json';

      function applyConfig(cfg) {
        if (cfg.orderOfWorshipUrl) {
          document.getElementById('btn-worship').href = cfg.orderOfWorshipUrl;
        }
        if (cfg.giveOnlineUrl) {
          document.getElementById('btn-give').href = cfg.giveOnlineUrl;
        }
        if (cfg.connectCardUrl) {
          document.getElementById('btn-connect').href = cfg.connectCardUrl;
        }
      }

      function applyNewsletter(data) {
        if (data.url) {
          document.getElementById('btn-newsletter').href = data.url;
        }
      }

      function fetchJSON(path, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', path + '?t=' + Date.now(), true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              callback(JSON.parse(xhr.responseText));
            } catch (e) {
              // ignore parse errors
            }
          }
        };
        xhr.send();
      }

      fetchJSON(CONFIG_PATH, applyConfig);
      fetchJSON(NEWSLETTER_PATH, applyNewsletter);
    })();
  </script>
</body>
</html>
