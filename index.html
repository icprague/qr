<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <meta name="robots" content="noindex, nofollow">
  <title>International Church of Prague – Sunday Service</title>

  <!-- Google Analytics 4 -->
  <!-- Replace G-XXXXXXXXXX with your actual GA4 Measurement ID -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Raleway:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      padding: 20px;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      width: 50%;
      max-width: 300px;
      margin-bottom: 24px;
      display: block;
    }

    .heading {
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(28px, 8vw, 48px);
      color: #181c3a;
      text-align: center;
      margin-bottom: 30px;
    }

    .buttons {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn {
      display: block;
      width: 100%;
      padding: max(16px, 4vw);
      margin-bottom: 30px;
      background-color: #222a58;
      color: #f7f9fe;
      font-family: 'Raleway', sans-serif;
      font-weight: 600;
      font-size: clamp(22px, 7vw, 28px);
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      will-change: transform;
    }

    .btn:visited {
      color: #f7f9fe;
    }

    .btn:hover {
      background-color: #2d3570;
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(34, 42, 88, 0.3);
    }

    .btn:focus-visible {
      outline: 3px solid #4d6fff;
      outline-offset: 3px;
    }

    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 1px 4px rgba(34, 42, 88, 0.2);
    }
  </style>
</head>
<body>
  <img
    src="https://lh3.googleusercontent.com/d/1-XOxQXAiq2ws_-VB-FSksD5qKa4fQDSQ"
    alt="International Church of Prague"
    class="logo"
  >
  <h1 class="heading">SUNDAY SERVICE</h1>
  <div class="buttons">
    <a id="btn-worship" class="btn" href="#" target="_blank" rel="noopener">Order of Worship</a>
    <a id="btn-give" class="btn" href="#" target="_blank" rel="noopener">Giving</a>
    <a id="btn-newsletter" class="btn" href="#" target="_blank" rel="noopener">This Week's Newsletter</a>
    <a id="btn-connect" class="btn" href="#" target="_blank" rel="noopener">Connect Card</a>
  </div>

  <script>
    (function () {
      var CONFIG_PATH = 'config.json';
      var NEWSLETTER_PATH = 'newsletter-link.json';

      function applyConfig(cfg) {
        if (cfg.orderOfWorshipUrl) {
          document.getElementById('btn-worship').href = cfg.orderOfWorshipUrl;
        }
        if (cfg.giveOnlineUrl) {
          document.getElementById('btn-give').href = cfg.giveOnlineUrl;
        }
        if (cfg.connectCardUrl) {
          document.getElementById('btn-connect').href = cfg.connectCardUrl;
        }
      }

      function applyNewsletter(data) {
        if (data.url) {
          document.getElementById('btn-newsletter').href = data.url;
        }
      }

      function fetchJSON(path, callback) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', path + '?t=' + Date.now(), true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            try {
              callback(JSON.parse(xhr.responseText));
            } catch (e) {
              // ignore parse errors
            }
          }
        };
        xhr.send();
      }

      // Track button clicks via GA4
      var buttons = {
        'btn-worship':    'order_of_worship',
        'btn-give':       'giving',
        'btn-newsletter': 'newsletter',
        'btn-connect':    'connect_card'
      };
      Object.keys(buttons).forEach(function (id) {
        var el = document.getElementById(id);
        if (el) {
          el.addEventListener('click', function () {
            if (typeof gtag === 'function') {
              gtag('event', 'button_click', {
                button_name: buttons[id]
              });
            }
          });
        }
      });

      fetchJSON(CONFIG_PATH, applyConfig);
      fetchJSON(NEWSLETTER_PATH, applyNewsletter);
    })();
  </script>
</body>
</html>
